# sonar-project.properties
# Configuración para análisis con SonarCloud
# Documentación: https://docs.sonarcloud.io

# ── Identificación del proyecto ────────────────────────────────────────────────
sonar.projectKey=lauraarroyor_sonar-qa-demo
sonar.organization=lauraarroyor      
sonar.projectName=QA Demo — ISTQB Bugs
sonar.projectVersion=1.0.0

# ── Rutas de código fuente ─────────────────────────────────────────────────────
sonar.sources=src
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# ── Exclusiones ────────────────────────────────────────────────────────────────
sonar.exclusions=node_modules/**,coverage/**,**/*.min.js

# ── Cobertura (generada por Jest con --coverage) ───────────────────────────────
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ── Lenguajes ──────────────────────────────────────────────────────────────────
sonar.language=js

# ── Reglas de calidad clave que detectará este proyecto ───────────────────────
# S2068 - Hardcoded credentials        (CRITICAL)
# S1523 - eval() usage                 (CRITICAL)
# S5247 - XSS via innerHTML            (CRITICAL)
# S2076 - SQL Injection pattern        (CRITICAL)
# S3776 - Cognitive complexity         (MAJOR)
# S1481 - Unused variables             (MINOR)
# S108  - Empty catch block            (MAJOR)
# S2583 - Always true/false condition  (MAJOR)
# S131  - Switch without default       (MAJOR)
# S2699 - Tests without assertions     (MAJOR)
# S109  - Magic numbers                (MINOR)
# S2228 - console.log in production    (MINOR)
# S125  - Commented-out code           (MINOR)
